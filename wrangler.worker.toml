name = "my-aiorchestration"
main = "worker/index.js"
compatibility_date = "2026-05-11"
workers_dev = true
routes = [
  { pattern = "aiorchestration.space/*", zone_name = "aiorchestration.space" },
  { pattern = "www.aiorchestration.space/*", zone_name = "aiorchestration.space" }
]

[vars]
APP_ORIGIN = "https://aiorchestration.space"
CREEM_API_BASE = "https://api.creem.io"
CREEM_ENV = "live"

[assets]
directory = "./out"
binding = "SITE_ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [
  "/*"
]

[[d1_databases]]
binding = "DB"
# Shared production analytics D1. Rows are isolated by site_key.
database_name = "openclaw-launch"
database_id = "5c31068a-d85a-4c83-9efe-01e2de1ad22b"
