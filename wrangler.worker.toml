name = "my-aiorchestration"
main = "worker/index.js"
compatibility_date = "2026-05-11"
workers_dev = true
routes = [
  { pattern = "aiorchestration.space/*", zone_name = "aiorchestration.space" },
  { pattern = "www.aiorchestration.space/*", zone_name = "aiorchestration.space" }
]

[vars]
APP_ORIGIN = "https://aiorchestration.space"
CREEM_API_BASE = "https://api.creem.io"
CREEM_ENV = "live"

[[kv_namespaces]]
binding = "ANALYTICS_KV"
id = "3ca9f0016a974f8ca1c5ca15202d3521"

[assets]
directory = "./out"
binding = "SITE_ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [
  "/",
  "/pricing",
  "/resources/github",
  "/resources/tools",
  "/resources/open-source",
  "/resources/platform",
  "/resources/jobs",
  "/resources/langchain",
  "/resources/examples",
  "/resources/claude",
  "/privacy",
  "/terms",
  "/checkout/done",
  "/sitemap.xml",
  "/robots.txt",
  "/api/*"
]
